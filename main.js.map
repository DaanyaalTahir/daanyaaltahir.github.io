<h1 mat-dialog-title>{{project.title}}</h1>
<div mat-dialog-content fxLayout="column" fxLayoutAlign="space-between center" style="height: 100%">
  <div class="project-images">
    <img src="{{project.imgPaths[project.curImgIdx]}}" class="image-style" id="{{project.id}}">
    <div fxLayout="row" fxLayoutAlign="center end">
      <div *ngFor="let image of project.imgPaths; index as i;">
        <button mat-icon-button (click)="project.curImgIdx=i" class="images-selector"
          [ngClass]="{'current-selection-img': i==project.curImgIdx}"></button>

      </div>
    </div>
  </div>



  <div class="project-stack-style">
    <mat-chip-list class="example-chip" cdkDropList cdkDropListOrientation="horizontal">
      <mat-chip class="example-box" cdkDrag *ngFor="let elem of project.stack">
        {{elem}}
      </mat-chip>
    </mat-chip-list>
  </div>
</div>
